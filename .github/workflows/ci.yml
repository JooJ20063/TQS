name: Estruturalis

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-checks:
    name: Python checks (${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    env:
      MPLBACKEND: Agg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Check dependency consistency
        run: |
          pip check

      - name: Compile Python files
        run: |
          python -m compileall app core io_module plots

      - name: Run Estruturalis - central load beam
        run: |
          python app/main.py examples/viga_carga_central.json -o results/ci_viga_carga_central

      - name: Run Estruturalis - self weight frame
        run: |
          python app/main.py examples/portico_peso_proprio.json -o results/ci_portico_peso_proprio

      - name: Run Estruturalis - load combinations
        run: |
          python app/main.py examples/portico_combinacoes.json -o results/ci_portico_combinacoes

      - name: Run Estruturalis - frame3d cantilever nodal load
        run: |
          python app/main.py examples/viga_3d_console.json -o results/ci_viga_3d_console

      - name: Run Estruturalis - frame3d cantilever distributed load
        run: |
          python app/main.py examples/viga_3d_console_q.json -o results/ci_viga_3d_console_q

      - name: Run Estruturalis - frame3d cantilever global y
        run: |
          python app/main.py examples/viga_3d_console_y.json -o results/ci_viga_3d_console_y

      - name: Run Estruturalis - frame3d inclined cantilever
        run: |
          python app/main.py examples/viga_3d_console_inclinada.json -o results/ci_viga_3d_console_inclinada

      - name: Run Estruturalis - frame3d self weight
        run: |
          python app/main.py examples/viga_3d_peso_proprio.json -o results/ci_viga_3d_peso_proprio

      - name: Verify beam outputs
        run: |
          test -f results/ci_viga_carga_central/resultados.json
          test -f results/ci_viga_carga_central/estrutura.png
          test -f results/ci_viga_carga_central/deformada.png
          test -f results/ci_viga_carga_central/cortante.png
          test -f results/ci_viga_carga_central/momento_fletor.png

      - name: Verify self weight frame outputs
        run: |
          test -f results/ci_portico_peso_proprio/resultados.json
          test -f results/ci_portico_peso_proprio/estrutura.png
          test -f results/ci_portico_peso_proprio/deformada.png
          test -f results/ci_portico_peso_proprio/cortante.png
          test -f results/ci_portico_peso_proprio/momento_fletor.png

      - name: Verify combination outputs
        run: |
          test -f results/ci_portico_combinacoes/ELS_01/resultados.json
          test -f results/ci_portico_combinacoes/ELS_01/estrutura.png
          test -f results/ci_portico_combinacoes/ELS_01/deformada.png
          test -f results/ci_portico_combinacoes/ELS_01/cortante.png
          test -f results/ci_portico_combinacoes/ELS_01/momento_fletor.png

          test -f results/ci_portico_combinacoes/ELU_01/resultados.json
          test -f results/ci_portico_combinacoes/ELU_01/estrutura.png
          test -f results/ci_portico_combinacoes/ELU_01/deformada.png
          test -f results/ci_portico_combinacoes/ELU_01/cortante.png
          test -f results/ci_portico_combinacoes/ELU_01/momento_fletor.png

          test -f results/ci_portico_combinacoes/ELU_02/resultados.json
          test -f results/ci_portico_combinacoes/ELU_02/estrutura.png
          test -f results/ci_portico_combinacoes/ELU_02/deformada.png
          test -f results/ci_portico_combinacoes/ELU_02/cortante.png
          test -f results/ci_portico_combinacoes/ELU_02/momento_fletor.png

          test -f results/ci_portico_combinacoes/envoltoria.json
          test -f results/ci_portico_combinacoes/resumo_envoltoria.txt
          test -f results/ci_portico_combinacoes/envoltoria_elementos.csv
          test -f results/ci_portico_combinacoes/dimensionamento_vigas.csv
          test -f results/ci_portico_combinacoes/resumo_dimensionamento_vigas.txt
          test -f results/ci_portico_combinacoes/resumo_normativo.txt

      - name: Verify frame3d outputs
        run: |
          test -f results/ci_viga_3d_console/resultados.json
          test -f results/ci_viga_3d_console_q/resultados.json
          test -f results/ci_viga_3d_console_y/resultados.json
          test -f results/ci_viga_3d_console_inclinada/resultados.json
          test -f results/ci_viga_3d_peso_proprio/resultados.json

          python - <<'PY'
          import json
          import math

          def read(path):
              with open(path, "r", encoding="utf-8") as file:
                  return json.load(file)

          nodal = read("results/ci_viga_3d_console/resultados.json")
          distributed = read("results/ci_viga_3d_console_q/resultados.json")
          global_y = read("results/ci_viga_3d_console_y/resultados.json")
          inclined = read("results/ci_viga_3d_console_inclinada/resultados.json")
          self_weight = read("results/ci_viga_3d_peso_proprio/resultados.json")

          assert nodal["analysis_type"] == "frame3d"
          assert distributed["analysis_type"] == "frame3d"
          assert global_y["analysis_type"] == "frame3d"
          assert inclined["analysis_type"] == "frame3d"
          assert self_weight["analysis_type"] == "frame3d"

          assert nodal["equilibrium"]["status"] == "OK"
          assert distributed["equilibrium"]["status"] == "OK"
          assert global_y["equilibrium"]["status"] == "OK"
          assert inclined["equilibrium"]["status"] == "OK"
          assert self_weight["equilibrium"]["status"] == "OK"

          nodal_node_2 = nodal["displacements"][1]
          nodal_reaction = nodal["reactions"][0]

          assert math.isclose(nodal_node_2["uz"], -0.0256, rel_tol=1e-9, abs_tol=1e-12)
          assert math.isclose(nodal_reaction["fz"], 10.0, rel_tol=1e-9, abs_tol=1e-12)
          assert math.isclose(nodal_reaction["my"], -40.0, rel_tol=1e-9, abs_tol=1e-12)

          distributed_node_2 = distributed["displacements"][1]
          distributed_reaction = distributed["reactions"][0]

          assert math.isclose(distributed_node_2["uz"], -0.0384, rel_tol=1e-9, abs_tol=1e-12)
          assert math.isclose(distributed_reaction["fz"], 40.0, rel_tol=1e-9, abs_tol=1e-12)
          assert math.isclose(distributed_reaction["my"], -80.0, rel_tol=1e-9, abs_tol=1e-12)

          global_y_node_2 = global_y["displacements"][1]
          global_y_reaction = global_y["reactions"][0]

          assert global_y_node_2["uz"] < 0.0
          assert math.isclose(global_y_reaction["fz"], 10.0, rel_tol=1e-9, abs_tol=1e-8)
          assert math.isclose(global_y_reaction["mx"], 40.0, rel_tol=1e-9, abs_tol=1e-8)

          inclined_node_2 = inclined["displacements"][1]
          inclined_reaction = inclined["reactions"][0]

          assert inclined_node_2["uz"] < 0.0
          assert math.isclose(inclined_reaction["fz"], 10.0, rel_tol=1e-9, abs_tol=1e-8)
          assert math.isclose(inclined_reaction["mx"], 30.0, rel_tol=1e-9, abs_tol=1e-8)
          assert math.isclose(inclined_reaction["my"], -40.0, rel_tol=1e-9, abs_tol=1e-8)
          assert math.isclose(inclined_reaction["mz"], 0.0, rel_tol=1e-9, abs_tol=1e-8)

          self_weight_reaction = self_weight["reactions"][0]

          assert math.isclose(self_weight_reaction["fz"], 10.0, rel_tol=1e-9, abs_tol=1e-8)
          assert math.isclose(self_weight_reaction["my"], -20.0, rel_tol=1e-9, abs_tol=1e-8)

          print("Frame3D checks passed.")
          PY
