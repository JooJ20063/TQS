name: Estruturalis

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-checks:
    name: Python checks (${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    env:
      MPLBACKEND: Agg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Check dependency consistency
        run: |
          pip check

      - name: Compile Python files
        run: |
          python -m compileall app core io_module plots

      - name: Run Estruturalis - central load beam
        run: |
          python app/main.py examples/viga_carga_central.json -o results/ci_viga_carga_central

      - name: Run Estruturalis - self weight frame
        run: |
          python app/main.py examples/portico_peso_proprio.json -o results/ci_portico_peso_proprio

      - name: Run Estruturalis - load combinations
        run: |
          python app/main.py examples/portico_combinacoes.json -o results/ci_portico_combinacoes

      - name: Run Estruturalis - frame3d cantilever nodal load
        run: |
          python app/main.py examples/viga_3d_console.json -o results/ci_viga_3d_console

      - name: Run Estruturalis - frame3d cantilever distributed load
        run: |
          python app/main.py examples/viga_3d_console_q.json -o results/ci_viga_3d_console_q

      - name: Run Estruturalis - frame3d cantilever global y
        run: |
          python app/main.py examples/viga_3d_console_y.json -o results/ci_viga_3d_console_y

      - name: Run Estruturalis - frame3d inclined cantilever
        run: |
          python app/main.py examples/viga_3d_console_inclinada.json -o results/ci_viga_3d_console_inclinada

      - name: Run Estruturalis - frame3d self weight
        run: |
          python app/main.py examples/viga_3d_peso_proprio.json -o results/ci_viga_3d_peso_proprio

      - name: Run Estruturalis - frame3d console
        run: |
          python app/main.py examples/viga_3d_console.json -o results/ci_viga_3d_console

      - name: Run Estruturalis - frame3d distributed load
        run: |
          python app/main.py examples/viga_3d_console_q.json -o results/ci_viga_3d_console_q

      - name: Run Estruturalis - frame3d global y
        run: |
          python app/main.py examples/viga_3d_console_y.json -o results/ci_viga_3d_console_y

      - name: Run Estruturalis - frame3d inclined
        run: |
          python app/main.py examples/viga_3d_console_inclinada.json -o results/ci_viga_3d_console_inclinada

      - name: Run Estruturalis - frame3d self weight
        run: |
          python app/main.py examples/viga_3d_peso_proprio.json -o results/ci_viga_3d_peso_proprio

      - name: Run Estruturalis - simple frame3d portal
        run: |
          python app/main.py examples/portico_3d_simples.json -o results/ci_portico_3d_simples

      - name: Verify beam outputs
        run: |
          test -f results/ci_viga_carga_central/resultados.json
          test -f results/ci_viga_carga_central/estrutura.png
          test -f results/ci_viga_carga_central/deformada.png
          test -f results/ci_viga_carga_central/cortante.png
          test -f results/ci_viga_carga_central/momento_fletor.png

      - name: Verify self weight frame outputs
        run: |
          test -f results/ci_portico_peso_proprio/resultados.json
          test -f results/ci_portico_peso_proprio/estrutura.png
          test -f results/ci_portico_peso_proprio/deformada.png
          test -f results/ci_portico_peso_proprio/cortante.png
          test -f results/ci_portico_peso_proprio/momento_fletor.png

      - name: Verify combination outputs
        run: |
          test -f results/ci_portico_combinacoes/ELS_01/resultados.json
          test -f results/ci_portico_combinacoes/ELS_01/estrutura.png
          test -f results/ci_portico_combinacoes/ELS_01/deformada.png
          test -f results/ci_portico_combinacoes/ELS_01/cortante.png
          test -f results/ci_portico_combinacoes/ELS_01/momento_fletor.png

          test -f results/ci_portico_combinacoes/ELU_01/resultados.json
          test -f results/ci_portico_combinacoes/ELU_01/estrutura.png
          test -f results/ci_portico_combinacoes/ELU_01/deformada.png
          test -f results/ci_portico_combinacoes/ELU_01/cortante.png
          test -f results/ci_portico_combinacoes/ELU_01/momento_fletor.png

          test -f results/ci_portico_combinacoes/ELU_02/resultados.json
          test -f results/ci_portico_combinacoes/ELU_02/estrutura.png
          test -f results/ci_portico_combinacoes/ELU_02/deformada.png
          test -f results/ci_portico_combinacoes/ELU_02/cortante.png
          test -f results/ci_portico_combinacoes/ELU_02/momento_fletor.png
          test -f results/ci_portico_combinacoes/ELU_02/resumo_flechas.txt

          test -f results/ci_portico_combinacoes/envoltoria.json
          test -f results/ci_portico_combinacoes/resumo_envoltoria.txt
          test -f results/ci_portico_combinacoes/envoltoria_elementos.csv
          test -f results/ci_portico_combinacoes/dimensionamento_vigas.csv
          test -f results/ci_portico_combinacoes/resumo_dimensionamento_vigas.txt
          test -f results/ci_portico_combinacoes/resumo_normativo.txt
          
      - name: Verify frame3d outputs
        run: |
          test -f results/ci_viga_3d_console/resultados.json
          test -f results/ci_viga_3d_console_q/resultados.json
          test -f results/ci_viga_3d_console_y/resultados.json
          test -f results/ci_viga_3d_console_inclinada/resultados.json
          test -f results/ci_viga_3d_peso_proprio/resultados.json
          test -f results/ci_viga_3d_peso_proprio/resumo_flechas.txt

          test -f results/ci_viga_3d_console/estrutura_3d.png
          test -f results/ci_viga_3d_console/deformada_3d.png

          test -f results/ci_viga_3d_console_q/estrutura_3d.png
          test -f results/ci_viga_3d_console_q/deformada_3d.png

          test -f results/ci_viga_3d_console_y/estrutura_3d.png
          test -f results/ci_viga_3d_console_y/deformada_3d.png

          test -f results/ci_viga_3d_console_inclinada/estrutura_3d.png
          test -f results/ci_viga_3d_console_inclinada/deformada_3d.png

          test -f results/ci_viga_3d_peso_proprio/estrutura_3d.png
          test -f results/ci_viga_3d_peso_proprio/deformada_3d.png
          test -f results/ci_portico_3d_simples/resumo_grafico_3d.txt
          test -f results/ci_viga_3d_console/estrutura_3d_interativa.html

          test -f results/ci_viga_3d_console/envoltoria_3d.json
          test -f results/ci_viga_3d_console/envoltoria_3d.csv
          test -f results/ci_viga_3d_console/resumo_envoltoria_3d.txt

          test -f results/ci_viga_3d_console/resumo_deslocamentos_3d.txt
          test -f results/ci_viga_3d_console/deslocamentos_3d.csv
          test -f results/ci_viga_3d_console/dimensionamento_vigas_3d.csv
          test -f results/ci_viga_3d_console/resumo_dimensionamento_vigas_3d.txt
          test -f results/ci_viga_3d_console/pilares_3d.csv
          test -f results/ci_viga_3d_console/resumo_pilares_3d.txt
          test -f results/ci_portico_3d_simples/pilares_3d.csv
          test -f results/ci_portico_3d_simples/resumo_pilares_3d.txt

          test -f results/ci_viga_3d_console/memorial_3d.txt
          test -f results/ci_portico_3d_simples/memorial_3d.txt

          python - <<'PY'
          import json
          import math

          def read(path):
              with open(path, "r", encoding="utf-8") as file:
                  return json.load(file)

          nodal = read("results/ci_viga_3d_console/resultados.json")
          distributed = read("results/ci_viga_3d_console_q/resultados.json")
          global_y = read("results/ci_viga_3d_console_y/resultados.json")
          inclined = read("results/ci_viga_3d_console_inclinada/resultados.json")
          self_weight = read("results/ci_viga_3d_peso_proprio/resultados.json")
          with open("results/ci_viga_3d_peso_proprio/resumo_flechas.txt", "r", encoding="utf-8") as file:
              deflection_text = file.read()

          assert "RESUMO PRELIMINAR DE FLECHAS" in deflection_text
          assert "Tipo de análise: frame3d" in deflection_text
          assert "Status:" in deflection_text

          assert nodal["analysis_type"] == "frame3d"
          assert distributed["analysis_type"] == "frame3d"
          assert global_y["analysis_type"] == "frame3d"
          assert inclined["analysis_type"] == "frame3d"
          assert self_weight["analysis_type"] == "frame3d"

          assert nodal["equilibrium"]["status"] == "OK"
          assert distributed["equilibrium"]["status"] == "OK"
          assert global_y["equilibrium"]["status"] == "OK"
          assert inclined["equilibrium"]["status"] == "OK"
          assert self_weight["equilibrium"]["status"] == "OK"

          nodal_node_2 = nodal["displacements"][1]
          nodal_reaction = nodal["reactions"][0]

          assert math.isclose(nodal_node_2["uz"], -0.0256, rel_tol=1e-9, abs_tol=1e-12)
          assert math.isclose(nodal_reaction["fz"], 10.0, rel_tol=1e-9, abs_tol=1e-12)
          assert math.isclose(nodal_reaction["my"], -40.0, rel_tol=1e-9, abs_tol=1e-12)

          distributed_node_2 = distributed["displacements"][1]
          distributed_reaction = distributed["reactions"][0]

          assert math.isclose(distributed_node_2["uz"], -0.0384, rel_tol=1e-9, abs_tol=1e-12)
          assert math.isclose(distributed_reaction["fz"], 40.0, rel_tol=1e-9, abs_tol=1e-12)
          assert math.isclose(distributed_reaction["my"], -80.0, rel_tol=1e-9, abs_tol=1e-12)

          global_y_node_2 = global_y["displacements"][1]
          global_y_reaction = global_y["reactions"][0]

          assert global_y_node_2["uz"] < 0.0
          assert math.isclose(global_y_reaction["fz"], 10.0, rel_tol=1e-9, abs_tol=1e-8)
          assert math.isclose(global_y_reaction["mx"], 40.0, rel_tol=1e-9, abs_tol=1e-8)

          inclined_node_2 = inclined["displacements"][1]
          inclined_reaction = inclined["reactions"][0]

          assert inclined_node_2["uz"] < 0.0
          assert math.isclose(inclined_reaction["fz"], 10.0, rel_tol=1e-9, abs_tol=1e-8)
          assert math.isclose(inclined_reaction["mx"], 30.0, rel_tol=1e-9, abs_tol=1e-8)
          assert math.isclose(inclined_reaction["my"], -40.0, rel_tol=1e-9, abs_tol=1e-8)
          assert math.isclose(inclined_reaction["mz"], 0.0, rel_tol=1e-9, abs_tol=1e-8)

          self_weight_reaction = self_weight["reactions"][0]

          assert math.isclose(self_weight_reaction["fz"], 10.0, rel_tol=1e-9, abs_tol=1e-8)
          assert math.isclose(self_weight_reaction["my"], -20.0, rel_tol=1e-9, abs_tol=1e-8)

          print("Frame3D checks passed.")
          PY
      - name: Verify common result accessors
        run: |
          python - <<'PY'
          import json

          from core.result_accessors import create_common_result_summary

          def read(path):
              with open(path, "r", encoding="utf-8") as file:
                  return json.load(file)

          frame2d = read("results/ci_portico_combinacoes/ELU_02/resultados.json")
          frame3d = read("results/ci_viga_3d_peso_proprio/resultados.json")

          summary_2d = create_common_result_summary(frame2d)
          summary_3d = create_common_result_summary(frame3d)

          assert summary_2d["analysis_type"] == "frame2d"
          assert summary_3d["analysis_type"] == "frame3d"

          assert summary_2d["max_translation"] is not None
          assert summary_2d["max_rotation"] is not None
          assert summary_2d["max_element_forces"]["moment"] is not None
          assert summary_2d["equilibrium_status"] == "OK"

          assert summary_3d["max_translation"] is not None
          assert summary_3d["max_rotation"] is not None
          assert summary_3d["max_element_forces"]["moment_z"] is not None
          assert summary_3d["equilibrium_status"] == "OK"

          with open("results/ci_portico_3d_simples/resumo_grafico_3d.txt", "r", encoding="utf-8") as file:
              graphics_summary = file.read()

          assert "RESUMO GRÁFICO 3D - Estruturalis" in graphics_summary
          assert "estrutura_3d.png" in graphics_summary
          assert "deformada_3d.png" in graphics_summary
          assert "cargas nodais translacionais Fx, Fy e Fz" in graphics_summary
          assert "cargas distribuídas 3D qx, qy e qz" in graphics_summary

          print("Common result accessors passed.")
          PY

      - name: Verify frame3d interactive html
        run: |
          python - <<'PY'
          from pathlib import Path

          html_path = Path("results/ci_viga_3d_console/estrutura_3d_interativa.html")
          assert html_path.exists()

          content = html_path.read_text(encoding="utf-8")
          assert "plotly" in content.lower()
          assert "Estrutura 3D Interativa" in content

          print("Interactive HTML check passed.")
          PY

      - name: Verify frame3d displacement report
        run: |
          python - <<'PY'
          import csv
          from pathlib import Path

          output_dir = Path("results/ci_viga_3d_console")

          report_path = output_dir / "resumo_deslocamentos_3d.txt"
          csv_path = output_dir / "deslocamentos_3d.csv"

          assert report_path.exists()
          assert csv_path.exists()

          report = report_path.read_text(encoding="utf-8")

          assert "RESUMO DE DESLOCAMENTOS 3D - Estruturalis" in report
          assert "Tipo de análise: frame3d" in report
          assert "Deslocamento uz" in report
          assert "Deslocamento translacional resultante" in report
          assert "Drift aproximado por pavimento" in report

          with csv_path.open("r", encoding="utf-8") as file:
              rows = list(csv.DictReader(file))

          assert len(rows) == 2

          node_2 = next(row for row in rows if row["node"] == "2")

          assert abs(float(node_2["uz"]) - (-0.0256)) < 1e-10
          assert abs(float(node_2["ry"]) - 0.0096) < 1e-10
          assert abs(float(node_2["translation_resultant"]) - 0.0256) < 1e-10
          assert abs(float(node_2["rotation_resultant"]) - 0.0096) < 1e-10

          print("Frame3d displacement report checks passed.")
          PY
      - name: Verify preliminary frame3d beam design
        run: |
          python - <<'PY'
          import csv
          from pathlib import Path

          output_dirs = [
              Path("results/ci_viga_3d_console"),
              Path("results/ci_portico_3d_simples"),
          ]

          for output_dir in output_dirs:
              csv_path = output_dir / "dimensionamento_vigas_3d.csv"
              report_path = output_dir / "resumo_dimensionamento_vigas_3d.txt"

              assert csv_path.exists(), csv_path
              assert report_path.exists(), report_path

              report = report_path.read_text(encoding="utf-8")

              assert "RESUMO DO DIMENSIONAMENTO PRELIMINAR DE VIGAS 3D - Estruturalis" in report
              assert "Tipo de análise: frame3d" in report
              assert "preliminary_reinforced_concrete_beam_design_3d" in report
              assert "Dimensionamento preliminar por flexão simples separada" in report
              assert "Não considera cortante, torção, ancoragem" in report

              with csv_path.open("r", encoding="utf-8") as file:
                  rows = list(csv.DictReader(file))

              assert rows, csv_path

              required_columns = {
                  "element",
                  "node_i",
                  "node_j",
                  "classification",
                  "status",
                  "my_kNm",
                  "mz_kNm",
                  "as_my_cm2",
                  "as_mz_cm2",
                  "as_required_cm2",
                  "critical_axis",
              }

              assert required_columns.issubset(rows[0].keys())

              designed_beams = [
                  row for row in rows
                  if row["classification"] == "beam"
                  and row["status"] in {"ok", "warning"}
              ]

              assert designed_beams, f"Nenhuma viga dimensionada em {output_dir}"

              for row in designed_beams:
                  assert float(row["as_required_cm2"]) >= 0.0
                  assert row["critical_axis"] in {"My", "Mz"}

          print("Preliminary frame3d beam design checks passed.")
          PY

      - name: Verify frame3d column critical forces report
        run: |
          python - <<'PY'
          import csv
          from pathlib import Path

          output_dirs = [
              Path("results/ci_viga_3d_console"),
              Path("results/ci_portico_3d_simples"),
          ]

          for output_dir in output_dirs:
              csv_path = output_dir / "pilares_3d.csv"
              report_path = output_dir / "resumo_pilares_3d.txt"

              assert csv_path.exists(), csv_path
              assert report_path.exists(), report_path

              report = report_path.read_text(encoding="utf-8")

              assert "RESUMO DE ESFORÇOS CRÍTICOS EM PILARES 3D - Estruturalis" in report
              assert "Tipo de análise: frame3d" in report
              assert "column_critical_forces_3d" in report
              assert "Esta rotina não dimensiona pilares" in report
              assert "interação N + My + Mz" in report

              with csv_path.open("r", encoding="utf-8") as file:
                  rows = list(csv.DictReader(file))

              required_columns = {
                  "element",
                  "node_i",
                  "node_j",
                  "status",
                  "normal_value",
                  "normal_abs",
                  "moment_y_value",
                  "moment_y_abs",
                  "moment_z_value",
                  "moment_z_abs",
                  "preliminary_index",
              }

              assert required_columns.issubset(rows[0].keys()) if rows else True

              if output_dir.name == "ci_portico_3d_simples":
                  ok_columns = [
                      row for row in rows
                      if row["status"] == "ok"
                  ]

                  assert ok_columns, "Nenhum pilar identificado no pórtico 3D simples"

                  for row in ok_columns:
                      assert float(row["normal_abs"]) >= 0.0
                      assert float(row["moment_y_abs"]) >= 0.0
                      assert float(row["moment_z_abs"]) >= 0.0
                      assert float(row["preliminary_index"]) >= 0.0

          print("Frame3d column critical forces checks passed.")
          PY

      - name: Verify frame3d integrated memorial
        run: |
          python - <<'PY'
          from pathlib import Path

          output_dirs = [
              Path("results/ci_viga_3d_console"),
              Path("results/ci_portico_3d_simples"),
          ]

          required_sections = [
              "MEMORIAL INTEGRADO 3D - Estruturalis",
              "1. Dados gerais da análise",
              "2. Equilíbrio global",
              "3. Deslocamentos e drift",
              "4. Envoltória de esforços 3D",
              "5. Dimensionamento preliminar de vigas 3D",
              "6. Pilares 3D - esforços críticos",
              "7. Arquivos principais gerados",
              "8. Limitações e observações",
          ]

          for output_dir in output_dirs:
              memorial_path = output_dir / "memorial_3d.txt"

              assert memorial_path.exists(), memorial_path

              text = memorial_path.read_text(encoding="utf-8")

              for section in required_sections:
                  assert section in text, f"Seção ausente em {memorial_path}: {section}"

              assert "Tipo de análise: frame3d" in text
              assert "Status:" in text
              assert "Os esforços internos 3D são apresentados no sistema local de cada barra" in text
              assert "não substitui verificação normativa completa" in text.lower()

          print("Frame3d integrated memorial checks passed.")
          PY
